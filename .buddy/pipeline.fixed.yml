- pipeline: mohammad-maviya1255-gmail-com
  name: Pipeline
  refs:
  - refs/heads/main
  fail_on_prepare_env_warning: true
  actions:
  - action: nosetests
    type: BUILD
    commands: |-
      pip install -r requirements.txt
      nosetests
    cached_dirs:
    - /root/.cache/pip
    shell: BASH
    docker_image_name: library/python
    docker_image_tag: 3.14
  - action: nosetests 2
    type: BUILD
    commands: |-
      pip install -r requirements.txt
      nosetests
    cached_dirs:
    - /root/.cache/pip
    shell: BASH
    docker_image_name: library/python
    docker_image_tag: 3.14
